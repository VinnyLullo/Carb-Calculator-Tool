<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carb Calculator Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Fast Food Carb Calculator</h1>

   <label>Restaurant</label>
<select id="restaurantSelect">
    <option value="all">All Restaurants</option>
</select>

<label>Search Food</label>
<input type="text" id="searchInput" placeholder="Type food name...">

    <div id="foodResults"></div>

    <h2>Meal</h2>
    <div id="mealList"></div>

    <h3>Total Carbs: <span id="totalCarbs">0</span> g</h3>

    <hr>

    <label>Insulin Ratio (grams per 1 unit)</label>
    <input type="number" id="ratioInput" value="10">

    <h3>Estimated Insulin: <span id="insulinResult">0</span> units</h3>

    <p class="disclaimer">
        For carb counting assistance only. Always verify insulin dosing using
        your doctor's recommendations and pump settings.
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
